#
# CoLiDo D1315 — Delta printer (Mini Kossel derivative)
# Board: RAMPS 1.4 (ATmega2560 @ 16MHz)
# Original firmware: Marlin 1.0.0 (jcrocholl / Mini Kossel)
#
# Parameters extracted from D1315/output.log:
#   Steps/mm : X=100.00  Y=100.00  Z=100.00  E=94.31
#   Max feedrate (mm/s) : XYZ=200  E=43
#   Max acceleration (mm/s²) : all axes = 9000
#   PID hotend : P=24.00 / I=0.40 / D=20.00
#   No heated bed, no SD card
#
# Delta geometry from D1315/CoLiDo D1315 3D Printer.reg:
#   rostockRadius = 67 mm  → DELTA_RADIUS  (refined by G33)
#   zhomepos      = 161 mm → DELTA_HEIGHT
#   printAreaHeight = 151 mm
#   DELTA_DIAGONAL_ROD ≈ 180 mm (Mini Kossel standard — measure ball-centre to
#   ball-centre before flashing; Configuration.h uses 150mm measured value)
#
# NOTE: Repetier's rostockRadius=67 maps directly to Marlin DELTA_RADIUS=67.
#   The bowl-shape/edge collision was caused by DELTA_HEIGHT=161 being wrong,
#   NOT by DELTA_RADIUS. Empirically validated Marlin values are:
#     DELTA_HEIGHT = 170.0 mm  (physical 161 + 9mm calibration offset)
#     DELTA_RADIUS =  67.0 mm  (matches Repetier rostockRadius exactly)
#

[env:D1315]
platform          = atmelavr
board             = megaatmega2560
board_build.f_cpu = 16000000L
lib_deps          = ${common.lib_deps}
build_src_filter  = ${common.default_src_filter} +<src/HAL/AVR>
build_flags       = ${common.build_flags}
  -DMOTHERBOARD=BOARD_RAMPS_14_EFB
  -DKNUTWURST_D1315
  -DX_MIN_PIN=-1
  -DX_MAX_PIN=3
  -DY_MIN_PIN=-1
  -DY_MAX_PIN=14
  -DZ_MIN_PIN=-1
  -DZ_MAX_PIN=18
build_unflags     =
  -DKNUTWURST_MEGA
  -DKNUTWURST_MEGA_S
  -DKNUTWURST_MEGA_X
  -DKNUTWURST_MEGA_P
  -DKNUTWURST_DGUS2_TFT
  -DKNUTWURST_TMC
  -DKNUTWURST_BLTOUCH
  -DKNUTWURST_CHIRON
  -DKNUTWURST_4MAXP2
  -DKNUTWURST_4MAXP
  -DKNUTWURST_ONE_Z_ENDSTOP
